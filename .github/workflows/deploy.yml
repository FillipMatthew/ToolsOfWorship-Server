name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.1"

      - name: Build
        run: go build -v -o tow-server ./cmd/tow-server

      - name: Pre-deploy Cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Delete the specific folders and binary to ensure a clean slate
            # We use -f to ignore errors if the files don't exist yet
            rm -rf ${{ secrets.TARGET_DIR }}/public
            rm -rf ${{ secrets.TARGET_DIR }}/templates
            rm -f ${{ secrets.TARGET_DIR }}/tow-server
            # Re-create the directory structure so SCP doesn't fail
            mkdir -p ${{ secrets.TARGET_DIR }}/public
            mkdir -p ${{ secrets.TARGET_DIR }}/templates

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "tow-server,public/*,templates/*"
          target: ${{ secrets.TARGET_DIR }}

      - name: Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chmod +x ${{ secrets.TARGET_DIR }}/tow-server
            sudo systemctl restart tow-server
